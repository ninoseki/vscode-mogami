name: Publint

on:
  pull_request:
    paths:
      - 'package-lock.json'
      - 'package.json'
      - 'rollup.config.ts'

jobs:
  packaging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci
      - name: Check packaging works
        run: npm run package
